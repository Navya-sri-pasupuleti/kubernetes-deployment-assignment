apiVersion: apps/v1
kind: Deployment

metadata:
  name: k8s-demo-deployment

spec:
  replicas: 3

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1

  selector:
    matchLabels:
      app: k8s-demo

  template:
    metadata:
      labels:
        app: k8s-demo

    spec:
      containers:
      - name: k8s-demo-container
        image: kubernetes_ass:v1
        imagePullPolicy: Never

        ports:
        - containerPort: 3000

        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 10

        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5

        startupProbe:
          httpGet:
            path: /health
            port: 3000
          failureThreshold: 30
          periodSeconds: 5
