apiVersion: apps/v1
kind: ReplicaSet

metadata:
  name: k8s-demo-rs

spec:
  replicas: 3

  selector:
    matchLabels:
      app: k8s-demo

  template:
    metadata:
      labels:
        app: k8s-demo

    spec:
      containers:
      - name: k8s-demo-container
        image: kubernetes_ass:v2
        imagePullPolicy: Never

        ports:
        - containerPort: 3000
